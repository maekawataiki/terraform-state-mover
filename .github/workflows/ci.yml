name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - name: Check coverage threshold
        run: |
          COVERAGE=$(node -e "const r = require('./coverage/coverage-summary.json'); console.log(r.total.lines.pct)")
          echo "Lines coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 85" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below threshold of 85%"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets threshold of 85%"
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate performance fixture
        run: node scripts/generate-perf-fixture.mjs 10 15
      - name: Run performance benchmark
        run: node scripts/perf-benchmark.mjs | tee benchmark-results.json
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  demo:
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        terraform:
          - version: "1.7.5"
            name: tf-1.7
          - version: "1.9.7"
            name: tf-1.9
          - version: "latest"
            name: tf-latest
        include:
          - terraform:
              version: ""
              name: opentofu
            tofu: true
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Setup Terraform
        if: ${{ !matrix.tofu }}
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ matrix.terraform.version }}
      - name: Setup OpenTofu
        if: ${{ matrix.tofu }}
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest
          tofu_wrapper: true
      - run: pnpm install --frozen-lockfile
      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          TF_BINARY: ${{ matrix.tofu && 'tofu' || 'terraform' }}
      - name: Run demos
        run: pnpm demo
