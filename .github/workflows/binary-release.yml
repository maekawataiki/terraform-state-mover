name: Binary Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: tf-state-mover-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: tf-state-mover-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: tf-state-mover-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: tf-state-mover-darwin-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build binary
        run: |
          mkdir -p dist/bin
          bun build src/cli.ts --compile --target=${{ matrix.target }} --outfile=dist/bin/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/bin/${{ matrix.artifact }}

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x binaries/*

      - name: Create checksums
        working-directory: binaries
        run: sha256sum * > checksums.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            binaries/tf-state-mover-*
            binaries/checksums.txt
          generate_release_notes: true
